name: Monitor sources

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  actions: write  # needed to persist last-seen state in repository variables

jobs:
  wikipedia:
    name: Wikipedia — nouvelles modifications
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create curation \
            --repo "${{ github.repository }}" \
            --color 0075ca \
            --description "Entrée à évaluer pour la timeline" \
            --force 2>/dev/null || true
          gh label create suppression-detectee \
            --repo "${{ github.repository }}" \
            --color d93f0b \
            --description "Suppression à vérifier sur Wikipedia" \
            --force 2>/dev/null || true

      - name: Check for new interesting revisions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LAST_REVID: ${{ vars.WIKIPEDIA_LAST_REVID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json, urllib.request, subprocess

          last_revid = os.environ.get('LAST_REVID', '').strip()
          repo       = os.environ['GITHUB_REPOSITORY']

          PAGE = "Liste_d%27attaques_terroristes_d%27extr%C3%AAme_droite"
          url  = (
              f"https://fr.wikipedia.org/w/api.php"
              f"?action=query&titles={PAGE}"
              f"&prop=revisions&rvprop=ids|timestamp|comment|user|size"
              f"&rvlimit=20&format=json"
          )
          req = urllib.request.Request(url, headers={
              'User-Agent': 'lextremedroitetue-monitor/1.0 (https://github.com/peroumal1/lextremedroitetue)'
          })
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.load(r)

          revisions  = list(data['query']['pages'].values())[0]['revisions']  # newest first
          latest_rev = str(revisions[0]['revid'])

          def set_variable(name, value):
              r = subprocess.run([
                  'gh', 'api', '--method', 'PATCH',
                  f'repos/{repo}/actions/variables/{name}',
                  '-f', f'value={value}',
              ], capture_output=True)
              if r.returncode != 0:
                  subprocess.run([
                      'gh', 'api', '--method', 'POST',
                      f'repos/{repo}/actions/variables',
                      '-f', f'name={name}', '-f', f'value={value}',
                  ], check=True)

          # First run: just initialise the cursor, open no issues
          if not last_revid:
              print(f"First run — initialising at revision {latest_rev}")
              set_variable('WIKIPEDIA_LAST_REVID', latest_rev)
              sys.exit(0)

          last_idx = next(
              (i for i, r in enumerate(revisions) if str(r['revid']) == last_revid),
              None,
          )

          if last_idx is None:
              print("Last revision not in the 20-revision window — advancing cursor")
          elif last_idx == 0:
              print("No new revisions since last check")
              sys.exit(0)
          else:
              new_revs = revisions[:last_idx]

              for i, rev in enumerate(new_revs):
                  # Size diff against the immediately preceding revision
                  prev      = new_revs[i + 1] if i + 1 < len(new_revs) else revisions[last_idx]
                  size_diff = rev['size'] - prev['size']
                  comment   = rev.get('comment', '')
                  user      = rev.get('user', '')
                  revid     = rev['revid']
                  date      = rev['timestamp'][:10]

                  is_bot     = 'Bot' in user or user.endswith('bot')
                  is_revert  = any(w in comment for w in
                                   ['Révocation', 'Annulation', 'Revert', 'revert'])
                  is_add     = size_diff >  80
                  is_del     = size_diff < -200

                  if is_bot or is_revert:
                      print(f"Skip {revid}: bot={is_bot} revert={is_revert}")
                      continue
                  if not is_add and not is_del:
                      print(f"Skip {revid}: size_diff={size_diff:+d} (below threshold)")
                      continue

                  diff_url = f"https://fr.wikipedia.org/w/index.php?diff={revid}"

                  if is_add:
                      title = f"Wikipedia : nouvelle entrée probable ({date}) — à évaluer"
                      label = "curation"
                      summary = f"Ajout de **{size_diff:+d} octets** — probablement une nouvelle entrée."
                  else:
                      title = f"Wikipedia : suppression détectée ({date}) — à vérifier"
                      label = "suppression-detectee"
                      summary = f"Suppression de **{abs(size_diff)} octets** — vérifier si une entrée a été retirée."

                  body = (
                      f"{summary}\n\n"
                      f"| | |\n|---|---|\n"
                      f"| **Auteur** | {user} |\n"
                      f"| **Date** | {rev['timestamp']} |\n"
                      f"| **Commentaire** | {comment[:200] or '_(aucun)_'} |\n"
                      f"| **Variation** | {size_diff:+d} octets |\n\n"
                      f"[Voir le diff →]({diff_url})"
                  )
                  subprocess.run([
                      'gh', 'issue', 'create',
                      '--repo', repo,
                      '--title', title,
                      '--body', body,
                      '--label', label,
                  ], check=True)
                  print(f"Issue opened for revision {revid} ({size_diff:+d} bytes)")

          set_variable('WIKIPEDIA_LAST_REVID', latest_rev)
          print(f"Cursor advanced to {latest_rev}")
          PYEOF

  google-alerts:
    name: Google Alerts — nouvelles alertes
    runs-on: ubuntu-latest
    # This job is skipped until GOOGLE_ALERTS_RSS_URL is configured.
    #
    # Setup:
    #   1. Go to google.com/alerts and create an alert, e.g.:
    #        "extrême droite" attentat OR fusillade OR agression France
    #   2. In delivery options select "RSS feed" and copy the feed URL.
    #   3. Repo → Settings → Secrets and variables → Actions → Variables
    #      → New repository variable → name: GOOGLE_ALERTS_RSS_URL → paste URL.
    if: vars.GOOGLE_ALERTS_RSS_URL != ''
    steps:
      - name: Ensure curation label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create curation \
            --repo "${{ github.repository }}" \
            --color 0075ca \
            --description "Entrée à évaluer pour la timeline" \
            --force 2>/dev/null || true

      - name: Fetch RSS and open issues for new items
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RSS_URL:   ${{ vars.GOOGLE_ALERTS_RSS_URL }}
          LAST_SEEN: ${{ vars.GOOGLE_ALERTS_LAST_SEEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, sys, urllib.request, xml.etree.ElementTree as ET, subprocess

          rss_url   = os.environ['RSS_URL']
          last_seen = os.environ.get('LAST_SEEN', '').strip()
          repo      = os.environ['GITHUB_REPOSITORY']

          with urllib.request.urlopen(rss_url, timeout=30) as r:
              root = ET.fromstring(r.read())

          ns    = {'atom': 'http://www.w3.org/2005/Atom'}
          items = []
          latest = last_seen

          for e in root.findall('atom:entry', ns):
              updated  = e.find('atom:updated', ns).text
              title_el = e.find('atom:title', ns)
              link_el  = e.find('atom:link', ns)
              title = (title_el.text or 'Sans titre') if title_el is not None else 'Sans titre'
              link  = link_el.attrib.get('href', '')  if link_el  is not None else ''
              items.append({'updated': updated, 'title': title, 'link': link})
              if not latest or updated > latest:
                  latest = updated

          # First run: record the current cursor without opening issues
          if not last_seen:
              print(f"First run — {len(items)} items in feed, initialising cursor")
              items = []

          new_items = [it for it in items if not last_seen or it['updated'] > last_seen]

          for item in new_items:
              body = (
                  "Nouvelle alerte Google détectée.\n\n"
                  f"**Titre :** {item['title']}\n"
                  f"**Lien :** {item['link']}\n"
                  f"**Date :** {item['updated']}\n\n"
                  "À vérifier pour ajout éventuel à la timeline."
              )
              subprocess.run([
                  'gh', 'issue', 'create',
                  '--repo', repo,
                  '--title', f"Alerte Google : {item['title'][:80]}",
                  '--body', body,
                  '--label', 'curation',
              ], check=True)

          if latest and latest != last_seen:
              r = subprocess.run([
                  'gh', 'api', '--method', 'PATCH',
                  f'repos/{repo}/actions/variables/GOOGLE_ALERTS_LAST_SEEN',
                  '-f', f'value={latest}',
              ], capture_output=True)
              if r.returncode != 0:
                  subprocess.run([
                      'gh', 'api', '--method', 'POST',
                      f'repos/{repo}/actions/variables',
                      '-f', 'name=GOOGLE_ALERTS_LAST_SEEN',
                      '-f', f'value={latest}',
                  ], check=True)

          print(f"Traité : {len(new_items)} nouvel(s) élément(s)")
          PYEOF
