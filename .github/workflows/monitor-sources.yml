name: Monitor sources

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: write  # to commit the state file

jobs:
  monitor:
    name: Vérification des sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create curation \
            --repo "${{ github.repository }}" \
            --color 0075ca \
            --description "Entrée à évaluer pour la timeline" \
            --force 2>/dev/null || true
          gh label create suppression-detectee \
            --repo "${{ github.repository }}" \
            --color d93f0b \
            --description "Suppression à vérifier sur Wikipedia" \
            --force 2>/dev/null || true

      - name: Check Wikipedia and Google Alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GOOGLE_ALERTS_RSS_URL: ${{ vars.GOOGLE_ALERTS_RSS_URL }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json, urllib.request, subprocess, pathlib
          import xml.etree.ElementTree as ET

          repo       = os.environ['GITHUB_REPOSITORY']
          state_file = pathlib.Path('.github/monitor-state.json')
          state      = json.loads(state_file.read_text()) if state_file.exists() else {}

          # ── Wikipedia ──────────────────────────────────────────────────────
          last_revid = state.get('wikipedia_last_revid', '').strip()
          PAGE = "Liste_d%27attaques_terroristes_d%27extr%C3%AAme_droite"
          url  = (
              "https://fr.wikipedia.org/w/api.php"
              f"?action=query&titles={PAGE}"
              "&prop=revisions&rvprop=ids|timestamp|comment|user|size"
              "&rvlimit=20&format=json"
          )
          req = urllib.request.Request(url, headers={
              'User-Agent': 'lextremedroitetue-monitor/1.0 (https://github.com/peroumal1/lextremedroitetue)'
          })
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.load(r)

          revisions  = list(data['query']['pages'].values())[0]['revisions']  # newest first
          latest_rev = str(revisions[0]['revid'])

          if not last_revid:
              print(f"Wikipedia: first run — initialising at {latest_rev}")
          else:
              last_idx = next(
                  (i for i, rev in enumerate(revisions) if str(rev['revid']) == last_revid),
                  None,
              )
              if last_idx is None:
                  print("Wikipedia: last revision not in the 20-revision window — advancing cursor")
              elif last_idx == 0:
                  print("Wikipedia: no new revisions since last check")
              else:
                  new_revs = revisions[:last_idx]
                  for i, rev in enumerate(new_revs):
                      prev      = new_revs[i + 1] if i + 1 < len(new_revs) else revisions[last_idx]
                      size_diff = rev['size'] - prev['size']
                      comment   = rev.get('comment', '')
                      user      = rev.get('user', '')
                      revid     = rev['revid']
                      date      = rev['timestamp'][:10]

                      is_bot    = 'Bot' in user or user.endswith('bot')
                      is_revert = any(w in comment for w in
                                      ['Révocation', 'Annulation', 'Revert', 'revert'])
                      is_add    = size_diff >  80
                      is_del    = size_diff < -200

                      if is_bot or is_revert:
                          print(f"Wikipedia: skip {revid} (bot/revert)")
                          continue
                      if not is_add and not is_del:
                          print(f"Wikipedia: skip {revid} (size_diff={size_diff:+d})")
                          continue

                      diff_url = f"https://fr.wikipedia.org/w/index.php?diff={revid}"
                      if is_add:
                          title   = f"Wikipedia : nouvelle entrée probable ({date}) — à évaluer"
                          label   = "curation"
                          summary = f"Ajout de **{size_diff:+d} octets** — probablement une nouvelle entrée."
                      else:
                          title   = f"Wikipedia : suppression détectée ({date}) — à vérifier"
                          label   = "suppression-detectee"
                          summary = f"Suppression de **{abs(size_diff)} octets** — vérifier si une entrée a été retirée."

                      body = (
                          f"{summary}\n\n"
                          "| | |\n|---|---|\n"
                          f"| **Auteur** | {user} |\n"
                          f"| **Date** | {rev['timestamp']} |\n"
                          f"| **Commentaire** | {comment[:200] or '_(aucun)_'} |\n"
                          f"| **Variation** | {size_diff:+d} octets |\n\n"
                          f"[Voir le diff →]({diff_url})"
                      )
                      subprocess.run([
                          'gh', 'issue', 'create',
                          '--repo', repo,
                          '--title', title,
                          '--body', body,
                          '--label', label,
                      ], check=True)
                      print(f"Wikipedia: issue opened for {revid} ({size_diff:+d} bytes)")

          state['wikipedia_last_revid'] = latest_rev
          print(f"Wikipedia: cursor → {latest_rev}")

          # ── Google Alerts ──────────────────────────────────────────────────
          # Activate by setting GOOGLE_ALERTS_RSS_URL as a repository variable:
          #   1. google.com/alerts → create alert → delivery: RSS feed → copy URL
          #   2. Repo → Settings → Secrets and variables → Actions → Variables
          #      → New variable → GOOGLE_ALERTS_RSS_URL → paste URL
          rss_url = os.environ.get('GOOGLE_ALERTS_RSS_URL', '').strip()
          if rss_url:
              last_seen = state.get('google_alerts_last_seen', '').strip()
              with urllib.request.urlopen(rss_url, timeout=30) as r:
                  root = ET.fromstring(r.read())

              ns        = {'atom': 'http://www.w3.org/2005/Atom'}
              latest_ts = last_seen
              all_items = []

              for e in root.findall('atom:entry', ns):
                  updated  = e.find('atom:updated', ns).text
                  title_el = e.find('atom:title', ns)
                  link_el  = e.find('atom:link', ns)
                  title = (title_el.text or 'Sans titre') if title_el is not None else 'Sans titre'
                  link  = link_el.attrib.get('href', '') if link_el is not None else ''
                  all_items.append({'updated': updated, 'title': title, 'link': link})
                  if not latest_ts or updated > latest_ts:
                      latest_ts = updated

              if not last_seen:
                  print(f"Google Alerts: first run — {len(all_items)} items, initialising cursor")
                  new_items = []
              else:
                  new_items = [it for it in all_items if it['updated'] > last_seen]

              for item in new_items:
                  body = (
                      "Nouvelle alerte Google détectée.\n\n"
                      f"**Titre :** {item['title']}\n"
                      f"**Lien :** {item['link']}\n"
                      f"**Date :** {item['updated']}\n\n"
                      "À vérifier pour ajout éventuel à la timeline."
                  )
                  subprocess.run([
                      'gh', 'issue', 'create',
                      '--repo', repo,
                      '--title', f"Alerte Google : {item['title'][:80]}",
                      '--body', body,
                      '--label', 'curation',
                  ], check=True)

              if latest_ts and latest_ts != last_seen:
                  state['google_alerts_last_seen'] = latest_ts
              print(f"Google Alerts: {len(new_items)} nouvel(s) élément(s)")
          else:
              print("Google Alerts: GOOGLE_ALERTS_RSS_URL not set, skipping")

          # ── Persist state ──────────────────────────────────────────────────
          state_file.write_text(json.dumps(state, indent=2) + '\n')
          print("State saved to .github/monitor-state.json")
          PYEOF

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/monitor-state.json
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push
